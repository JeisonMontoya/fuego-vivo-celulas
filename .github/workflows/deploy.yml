name: Deploy to HestiaCP VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executing Deployment Script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e # Detener el script si ocurre algún error
            
            cd /home/fuegovivo/web/lideres.fuegovivo.com.co/public_html
            
            # Instalar git si no existe en el VPS
            if ! command -v git &> /dev/null; then
                apt-get update && apt-get install -y git
            fi
            
            # Configurar permisos seguros de Git
            git config --global --add safe.directory /home/fuegovivo/web/lideres.fuegovivo.com.co/public_html
            
            # Si no es un repositorio de git, inicializarlo
            if [ ! -d ".git" ]; then
                git init
                git remote add origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            else
                # Actualizar la URL para usar el token siempre
                git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            fi
            
            # Forzar la descarga exacta de la rama main, descartando cambios locales accidentales
            git fetch origin main
            git reset --hard origin/main
            
            # Instalar dependencias de PHP
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-interaction --prefer-dist --optimize-autoloader
            
            # Correr migraciones de base de datos
            php artisan migrate --force
            
            # Optimizar caché de Laravel
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
