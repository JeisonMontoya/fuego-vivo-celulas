name: Deploy to HestiaCP VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executing Deployment Script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            cd /home/fuegovivo/web/lideres.fuegovivo.com.co/public_html
            
            # Descargar el nuevo código de GitHub
            git pull origin main
            
            # Instalar dependencias de PHP
            composer install --no-interaction --prefer-dist --optimize-autoloader
            
            # Instalar y compilar dependencias de Node/Vite (Frontend)
            npm install
            npm run build
            
            # Correr migraciones de base de datos
            php artisan migrate --force
            
            # Optimizar caché de Laravel
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
